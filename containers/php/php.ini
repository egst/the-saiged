display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

memory_limit = 256M

date.timezone = UTC

; Upload limits — chosen to cover typical photos (10–20 MB) and short videos
; (up to 50 MB). Anything larger should live on a dedicated CDN, not in the CMS.
upload_max_filesize = 50M
post_max_size       = 60M
