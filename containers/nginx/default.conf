server {
    listen 80;
    server_name _;
    root /var/www/the-saiged/public;

    client_max_body_size 60M;

    location / {
        # serve static files or fallback to PHP
        try_files $uri @php;
    }

    location ^~ /admin {
        # admin app SPA: serve /admin.html for /admin and any sub-path
        try_files $uri /admin.html;
    }

    location ~ ^/sections/(.+\.(?:js|css))$ {
        # serve section assets co-located with PHP code; whitelist js/css only
        alias /var/www/the-saiged/src/Sections/$1;
    }

    location ~ ^/uploads/(.+\.(?:jpg|jpeg|png|gif|webp|mp4|webm))$ {
        # user-uploaded media — whitelist by extension; PHP validates on upload
        alias /var/www/the-saiged/data/uploads/$1;
    }

    location @php {
        # all dynamic requests go to one entry script
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/the-saiged/src/index.php;
        include fastcgi_params;
    }

    location ~ /\. {
        # do not serve dotfiles
        deny all;
    }
}
