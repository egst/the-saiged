# HTTP — serve ACME challenges, redirect everything else to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main app.
# Certificate paths use a `current` symlink so the domain can change without
# editing this file (see notes/deploy.md).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/current/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/current/privkey.pem;

    root /var/www/the-saiged/public;
    client_max_body_size 60M;

    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        try_files $uri @php;
    }

    location ^~ /admin {
        try_files $uri /admin.html;
    }

    location ~ ^/sections/(.+\.(?:js|css))$ {
        alias /var/www/the-saiged/src/Sections/$1;
    }

    location ~ ^/uploads/(.+\.(?:jpg|jpeg|png|gif|webp|mp4|webm))$ {
        # user-uploaded media — whitelist by extension; PHP validates on upload
        alias /var/www/the-saiged/data/uploads/$1;
    }

    location @php {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/the-saiged/src/index.php;
        include fastcgi_params;
    }

    location ~ /\. {
        deny all;
    }
}
