services:

  nginx:
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: ./containers/php/Dockerfile
    depends_on:
      - mysql

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE:      the_saiged
      MYSQL_USER:          the_saiged
      MYSQL_PASSWORD:      dev
      MYSQL_ROOT_PASSWORD: dev
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
